<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>awoken.dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #06060e;
            --fg: #d0d0e0;
            --dim: #38384e;
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
        }

        #aurora {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px);
            background-size: 55px 55px;
            z-index: 2;
            pointer-events: none;
        }

        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(4,4,12,0.80) 100%);
            z-index: 3;
            pointer-events: none;
        }

        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(0,0,0,0.045) 3px,
                rgba(0,0,0,0.045) 4px
            );
            pointer-events: none;
            z-index: 4;
        }

        .stage {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .title {
            font-family: 'Inter', -apple-system, sans-serif;
            font-size: 1.2rem;
            font-weight: 200;
            letter-spacing: 0.65em;
            text-transform: uppercase;
            color: var(--fg);
            margin-bottom: 22px;
            position: relative;
            user-select: none;
        }

        .title::before,
        .title::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            opacity: 0;
            pointer-events: none;
        }
        .title::before { color: #8888ff; }
        .title::after  { color: #ff6666; }

        .title.glitching::before { animation: glitch-a 0.3s steps(1) forwards; }
        .title.glitching::after  { animation: glitch-b 0.3s steps(1) forwards; }

        @keyframes glitch-a {
            0%   { opacity: 0; }
            15%  { opacity: 0.85; transform: translate(-2px, 0); clip-path: polygon(0 15%, 100% 15%, 100% 45%, 0 45%); }
            45%  { opacity: 0; }
            60%  { opacity: 0.65; transform: translate(2px, 0); clip-path: polygon(0 58%, 100% 58%, 100% 82%, 0 82%); }
            100% { opacity: 0; }
        }

        @keyframes glitch-b {
            0%   { opacity: 0; }
            25%  { opacity: 0.75; transform: translate(2px, 1px); clip-path: polygon(0 38%, 100% 38%, 100% 68%, 0 68%); }
            55%  { opacity: 0; }
            70%  { opacity: 0.55; transform: translate(-2px, -1px); clip-path: polygon(0 5%, 100% 5%, 100% 28%, 0 28%); }
            100% { opacity: 0; }
        }

        .status {
            font-family: 'Space Mono', 'SF Mono', 'Fira Code', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: var(--dim);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 1em;
        }

        .cursor {
            display: inline-block;
            width: 5px;
            height: 0.72em;
            background: var(--dim);
            animation: blink 1.1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="aurora"></canvas>
    <div class="grid"></div>
    <div class="vignette"></div>
    <div class="scanlines"></div>

    <div class="stage">
        <h1 class="title" data-text="AWOKEN.DEV">AWOKEN.DEV</h1>
        <div class="status">
            <span id="statusText"></span>
            <span class="cursor"></span>
        </div>
    </div>

    <script>
        // --- Aurora ---
        const canvas = document.getElementById('aurora');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Smaller, brighter, more distinct blobs — screen blending makes them additive/luminous
        const blobs = [
            { r: 0.32, rgb: [140, 40, 255], a: 0.75, sx: 0.00025, sy: 0.00018, px: 0.0, py: 1.1, ox: 0.24, oy: 0.20 },
            { r: 0.28, rgb: [30,  80, 255], a: 0.65, sx: 0.00016, sy: 0.00028, px: 2.5, py: 0.3, ox: -0.24, oy: -0.16 },
            { r: 0.24, rgb: [20, 200, 190], a: 0.55, sx: 0.00032, sy: 0.00020, px: 4.8, py: 3.2, ox: 0.20,  oy: 0.24  },
            { r: 0.20, rgb: [200, 30, 160], a: 0.50, sx: 0.00040, sy: 0.00024, px: 1.5, py: 5.0, ox: -0.18, oy: -0.22 },
        ];

        function draw(ts) {
            // Fill with bg colour so screen blending has a base
            ctx.fillStyle = '#06060e';
            ctx.fillRect(0, 0, W, H);

            ctx.globalCompositeOperation = 'screen';
            blobs.forEach(b => {
                const cx = W * (0.5 + b.ox * Math.sin(ts * b.sx + b.px));
                const cy = H * (0.5 + b.oy * Math.sin(ts * b.sy + b.py));
                const rad = b.r * Math.max(W, H);
                const [r, g, bl] = b.rgb;
                const g2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
                g2.addColorStop(0,   `rgba(${r},${g},${bl},${b.a})`);
                g2.addColorStop(0.5, `rgba(${r},${g},${bl},${(b.a * 0.25).toFixed(3)})`);
                g2.addColorStop(1,   `rgba(${r},${g},${bl},0)`);
                ctx.fillStyle = g2;
                ctx.fillRect(0, 0, W, H);
            });
            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(draw);
        }
        requestAnimationFrame(draw);

        // --- Glitch ---
        const title = document.querySelector('.title');

        function triggerGlitch() {
            title.classList.add('glitching');
            setTimeout(() => title.classList.remove('glitching'), 320);
            setTimeout(triggerGlitch, 5000 + Math.random() * 9000);
        }
        setTimeout(triggerGlitch, 2500);

        // --- Typewriter ---
        const messages = [
            'System initializing',
            'Loading context',
            'Signal acquired',
            'Standing by',
            'Awaiting transmission',
        ];
        let mi = 0, ci = 0, del = false;
        const statusEl = document.getElementById('statusText');

        function type() {
            const msg = messages[mi];
            if (!del) {
                statusEl.textContent = msg.slice(0, ++ci);
                if (ci === msg.length) { del = true; return setTimeout(type, 2200); }
                setTimeout(type, 50 + Math.random() * 30);
            } else {
                statusEl.textContent = msg.slice(0, --ci);
                if (ci === 0) {
                    del = false;
                    mi = (mi + 1) % messages.length;
                    return setTimeout(type, 380);
                }
                setTimeout(type, 28);
            }
        }
        setTimeout(type, 800);
    </script>
</body>
</html>
