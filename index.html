<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>awoken.dev | Coming Soon</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --accent-color: #ffffff;
            --secondary-color: #333333;
            --glow-color: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--accent-color);
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        /* The Visual: The Eye */
        .eye-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .eye-outer {
            width: 100%;
            height: 60%;
            border: 2px solid var(--accent-color);
            border-radius: 100% 0;
            transform: rotate(45deg);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.5s ease;
            box-shadow: 0 0 20px var(--glow-color);
            animation: pulse 4s infinite ease-in-out;
        }

        .iris {
            width: 40px;
            height: 40px;
            background-color: var(--accent-color);
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pupil {
            width: 15px;
            height: 15px;
            background-color: var(--bg-color);
            border-radius: 50%;
        }

        @keyframes pulse {
            0%, 100% { transform: rotate(45deg) scale(1); opacity: 0.8; }
            50% { transform: rotate(45deg) scale(1.05); opacity: 1; box-shadow: 0 0 40px var(--glow-color); }
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 300;
        }

        p {
            font-size: 0.8rem;
            color: #666;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
        }

        .background-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="background-lines"></div>
    
    <div class="container">
        <div class="eye-container">
            <div class="eye-outer">
                <div class="iris">
                    <div class="pupil"></div>
                </div>
            </div>
        </div>
        <h1>awoken.dev</h1>
        <p>System Initializing</p>
    </div>
</body>
</html>
